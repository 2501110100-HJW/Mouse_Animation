<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사이버 쥐불놀이</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        cursor: none;
        background:
            radial-gradient(circle at center, rgba(60, 25, 10, 0.6), rgba(5, 5, 8, 1) 70%),
            rgb(8, 8, 10);
        font-family: Arial, sans-serif;
        user-select: none;
    }

    .fire-core {
        position: absolute;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        pointer-events: none;
        background: radial-gradient(circle, #ffffff 0%, #fff6a8 25%, #ff9f1a 55%, rgba(255, 50, 0, 0) 75%);
        box-shadow:
            0 0 18px #ffffff,
            0 0 35px #ffd166,
            0 0 70px #ff6b00;
        z-index: 10;
        will-change: transform, left, top;
    }

    .fire-trail {
        position: absolute;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        pointer-events: none;
        mix-blend-mode: screen;
        opacity: 0;
        background: radial-gradient(circle, #ffffff 0%, #ffe066 20%, #ff9f1a 45%, #ff3d00 70%, rgba(255, 0, 0, 0) 100%);
        box-shadow:
            0 0 12px rgba(255, 255, 255, 0.95),
            0 0 28px rgba(255, 190, 60, 0.9),
            0 0 58px rgba(255, 90, 0, 0.75);
        will-change: transform, opacity;
    }

    .game-ui {
        position: fixed;
        top: 24px;
        left: 24px;
        z-index: 100;
        color: #fff3c4;
        pointer-events: none;
    }

    .score {
        font-size: 42px;
        font-weight: 800;
        text-shadow:
            0 0 10px rgba(255, 255, 255, 0.8),
            0 0 28px rgba(255, 120, 0, 0.9);
    }

    .info {
        margin-top: 8px;
        font-size: 15px;
        color: rgba(255, 226, 180, 0.8);
        line-height: 1.5;
    }

    .timer {
        position: fixed;
        top: 24px;
        right: 24px;
        z-index: 100;
        color: #fff3c4;
        font-size: 34px;
        font-weight: 800;
        text-shadow:
            0 0 10px rgba(255, 255, 255, 0.8),
            0 0 28px rgba(255, 120, 0, 0.9);
        pointer-events: none;
    }

    /* 중앙 상단 회전 진행도 UI */
    .rotation-ui {
        position: fixed;
        left: 50%;
        top: 26px;
        transform: translateX(-50%);
        z-index: 120;
        width: 360px;
        padding: 16px 18px;
        border-radius: 22px;
        text-align: center;
        color: rgba(255, 238, 190, 0.95);
        pointer-events: none;
        background: rgba(20, 10, 5, 0.48);
        border: 1px solid rgba(255, 190, 80, 0.3);
        box-shadow:
            0 0 24px rgba(255, 110, 0, 0.18),
            inset 0 0 30px rgba(255, 160, 60, 0.06);
        backdrop-filter: blur(10px);
    }

    .rotation-label {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 10px;
        text-shadow: 0 0 12px rgba(255, 120, 0, 0.8);
    }

    .rotation-bar {
        width: 100%;
        height: 13px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 200, 120, 0.32);
    }

    .rotation-fill {
        width: 0%;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #ff4d00, #ffcc33, #ffffff);
        box-shadow:
            0 0 14px rgba(255, 255, 255, 0.8),
            0 0 24px rgba(255, 150, 0, 0.9);
    }

    .combo {
        margin-top: 10px;
        color: #ffdf70;
        font-size: 18px;
        font-weight: 800;
        text-shadow: 0 0 16px rgba(255, 120, 0, 0.9);
        opacity: 0;
        transition: opacity 0.2s;
    }

    .combo.active {
        opacity: 1;
    }

    .center-panel {
        position: fixed;
        left: 50%;
        top: 50%;
        z-index: 200;
        transform: translate(-50%, -50%);
        width: min(460px, calc(100vw - 40px));
        padding: 34px 30px;
        border-radius: 28px;
        text-align: center;
        color: #fff3c4;
        background: rgba(20, 10, 5, 0.72);
        border: 1px solid rgba(255, 190, 80, 0.35);
        box-shadow:
            0 0 30px rgba(255, 110, 0, 0.25),
            inset 0 0 40px rgba(255, 160, 60, 0.08);
        backdrop-filter: blur(12px);
    }

    .center-panel h1 {
        font-size: 32px;
        margin-bottom: 12px;
    }

    .center-panel p {
        font-size: 15px;
        line-height: 1.7;
        color: rgba(255, 226, 180, 0.82);
        margin-bottom: 24px;
    }

    .center-panel button {
        border: none;
        border-radius: 999px;
        padding: 14px 28px;
        font-size: 16px;
        font-weight: 700;
        color: #2b1300;
        background: linear-gradient(135deg, #fff3b0, #ffb347, #ff6b00);
        box-shadow:
            0 0 18px rgba(255, 180, 60, 0.8),
            0 8px 28px rgba(255, 80, 0, 0.35);
        cursor: pointer;
    }

    .center-panel.hidden {
        display: none;
    }

    /* 3초 카운트다운 */
    .countdown {
        position: fixed;
        left: 50%;
        top: 50%;
        z-index: 300;
        transform: translate(-50%, -50%);
        font-size: 120px;
        font-weight: 900;
        color: #fff4b8;
        opacity: 0;
        pointer-events: none;
        text-shadow:
            0 0 16px rgba(255, 255, 255, 0.95),
            0 0 42px rgba(255, 150, 0, 1),
            0 0 90px rgba(255, 80, 0, 0.8);
    }

    .countdown.active {
        opacity: 1;
        animation: countdownPop 0.85s ease forwards;
    }

    @keyframes countdownPop {
        0% {
            transform: translate(-50%, -50%) scale(0.55);
            opacity: 0;
        }

        25% {
            transform: translate(-50%, -50%) scale(1.12);
            opacity: 1;
        }

        100% {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }
    }
</style>
</head>

<body>

<div class="game-ui">
    <div class="score" id="scoreText">0</div>
    <div class="info">
        마우스를 원형으로 돌려야 점수를 얻습니다.<br>
        좌우로 흔들기만 하면 점수가 올라가지 않습니다.
    </div>
</div>

<div class="timer" id="timerText">30</div>

<div class="rotation-ui">
    <div class="rotation-label" id="rotationLabel">회전 진행도 0%</div>
    <div class="rotation-bar">
        <div class="rotation-fill" id="rotationFill"></div>
    </div>
    <div class="combo" id="comboText">COMBO x1.00</div>
</div>

<div class="center-panel" id="startPanel">
    <h1>쥐불놀이 점수 게임</h1>
    <p>
        제한 시간 30초 동안 마우스를 원형으로 돌리세요.<br>
        거의 한 바퀴를 완성할 때마다 20점을 얻습니다.
    </p>
    <button id="startButton">게임 시작</button>
</div>

<div class="center-panel hidden" id="endPanel">
    <h1>게임 종료</h1>
    <p id="resultText">최종 점수: 0점</p>
    <button id="restartButton">다시 시작</button>
</div>

<div class="countdown" id="countdownText">3</div>

<script>
function createStars() {
    for (let i = 0; i < 80; i++) {
        const star = document.createElement("div");
        star.style.position = "absolute";
        star.style.width = "3px";
        star.style.height = "3px";
        star.style.borderRadius = "50%";
        star.style.background = "rgba(255,255,255,0.6)";
        star.style.left = `${Math.random() * window.innerWidth}px`;
        star.style.top = `${Math.random() * window.innerHeight}px`;
        document.body.appendChild(star);
    }
}
    createStars();


    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;

    let previousMouseX = mouseX;
    let previousMouseY = mouseY;

    let fireX = mouseX;
    let fireY = mouseY;

    let rotate = 0;

    let score = 0;
    let timeLeft = 30;

    let isPlaying = false;
    let isCountingDown = false;

    let combo = 1;
    let comboTimer = 0;
    let gameTimer = null;
    let countdownTimer = null;

    const trailSize = 42;
    const maxTrails = 160;
    const trailSpacing = 8;
    const maxCreatePerMove = 10;
    const minMoveDistance = 3;

    /* 한 바퀴 성공 시 기본 점수 */
    const swingScore = 20;

    let circleCenterX = window.innerWidth / 2;
    let circleCenterY = window.innerHeight / 2;

    let previousAngle = null;
    let accumulatedAngle = 0;
    let rotationDirection = 0;

    const requiredAngle = Math.PI * 2 * 0.7;
    const minRadius = 60;
    const maxRadius = 420;

    const scoreText = document.getElementById("scoreText");
    const timerText = document.getElementById("timerText");
    const rotationLabel = document.getElementById("rotationLabel");
    const rotationFill = document.getElementById("rotationFill");
    const comboText = document.getElementById("comboText");

    const startPanel = document.getElementById("startPanel");
    const endPanel = document.getElementById("endPanel");
    const resultText = document.getElementById("resultText");

    const startButton = document.getElementById("startButton");
    const restartButton = document.getElementById("restartButton");
    const countdownText = document.getElementById("countdownText");

    const trails = [];
    let trailIndex = 0;

    const fireCore = document.createElement("div");
    fireCore.classList.add("fire-core");
    document.body.appendChild(fireCore);

    function createTrailPool() {
        for (let i = 0; i < maxTrails; i++) {
            const trail = document.createElement("div");
            trail.classList.add("fire-trail");
            document.body.appendChild(trail);

            trails.push({
                element: trail,
                opacity: 0,
                life: 0,
                rotate: 0
            });
        }
    }

    document.addEventListener("mousemove", function(event) {
        previousMouseX = mouseX;
        previousMouseY = mouseY;

        mouseX = event.clientX;
        mouseY = event.clientY;

        createSmoothTrail(previousMouseX, previousMouseY, mouseX, mouseY);

        if (isPlaying && !isCountingDown) {
            checkCircularMotion(mouseX, mouseY);
        }
    });

    function randomNumber(min, max) {
        return Math.random() * (max - min) + min;
    }

    function checkCircularMotion(x, y) {
        const dx = x - circleCenterX;
        const dy = y - circleCenterY;

        const radius = Math.sqrt(dx * dx + dy * dy);

        if (radius < minRadius || radius > maxRadius) {
            previousAngle = null;
            accumulatedAngle *= 0.96;
            updateRotationUI();
            return;
        }

        const currentAngle = Math.atan2(dy, dx);

        if (previousAngle === null) {
            previousAngle = currentAngle;
            return;
        }

        let angleDifference = currentAngle - previousAngle;

        if (angleDifference > Math.PI) {
            angleDifference -= Math.PI * 2;
        }

        if (angleDifference < -Math.PI) {
            angleDifference += Math.PI * 2;
        }

        previousAngle = currentAngle;

        if (Math.abs(angleDifference) < 0.015) {
            return;
        }

        if (Math.abs(angleDifference) > 0.9) {
            return;
        }

        const currentDirection = angleDifference > 0 ? 1 : -1;

        if (rotationDirection === 0) {
            rotationDirection = currentDirection;
        }

        if (currentDirection === rotationDirection) {
            accumulatedAngle += Math.abs(angleDifference);
        } else {
            accumulatedAngle *= 0.72;
            rotationDirection = currentDirection;
        }

        updateRotationUI();

        if (accumulatedAngle >= requiredAngle) {
            addCircleScore();

            accumulatedAngle = 0;
            previousAngle = null;
            rotationDirection = 0;

            updateRotationUI();
        }
    }

    function addCircleScore() {
        combo += 0.04;
        combo = Math.min(combo, 1.6);
        comboTimer = 70;

        const gainedScore = Math.floor(swingScore * combo);
        score += gainedScore;

        scoreText.textContent = score;
        comboText.textContent = `COMBO x${combo.toFixed(2)}`;
        comboText.classList.add("active");
    }

    function updateRotationUI() {
        const progress = Math.min(accumulatedAngle / requiredAngle, 1);
        const percent = Math.floor(progress * 100);

        rotationFill.style.width = `${percent}%`;
        rotationLabel.textContent = `회전 진행도 ${percent}%`;
    }

    function createSmoothTrail(startX, startY, endX, endY) {
        const dx = endX - startX;
        const dy = endY - startY;
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance < minMoveDistance) {
            return;
        }

        let count = Math.floor(distance / trailSpacing);

        count = Math.max(1, count);
        count = Math.min(maxCreatePerMove, count);

        for (let i = 0; i <= count; i++) {
            const progress = i / count;
            const x = startX + dx * progress;
            const y = startY + dy * progress;

            activateTrail(x, y);
        }
    }

    function activateTrail(x, y) {
        const trail = trails[trailIndex];

        trail.opacity = 1;
        trail.life = 34;
        trail.rotate = randomNumber(0, 360);

        trail.element.style.left = `${x - trailSize / 2}px`;
        trail.element.style.top = `${y - trailSize / 2}px`;
        trail.element.style.opacity = trail.opacity;
        trail.element.style.transform = `rotate(${trail.rotate}deg)`;

        trailIndex++;

        if (trailIndex >= trails.length) {
            trailIndex = 0;
        }
    }

    function moveFireCore() {
        fireX += (mouseX - fireX) * 0.35;
        fireY += (mouseY - fireY) * 0.35;

        rotate += 12;

        fireCore.style.left = `${fireX - 17}px`;
        fireCore.style.top = `${fireY - 17}px`;
        fireCore.style.transform = `rotate(${rotate}deg)`;
    }

    function animateTrails() {
        for (let i = 0; i < trails.length; i++) {
            const trail = trails[i];

            if (trail.life > 0) {
                trail.life -= 1;
                trail.opacity -= 0.03;
                trail.rotate += 2.5;

                if (trail.opacity < 0) {
                    trail.opacity = 0;
                }

                trail.element.style.opacity = trail.opacity;
                trail.element.style.transform = `rotate(${trail.rotate}deg)`;
            }
        }
    }

    function updateCombo() {
        if (!isPlaying || isCountingDown) {
            return;
        }

        if (comboTimer > 0) {
            comboTimer -= 1;
        } else {
            combo -= 0.01;

            if (combo <= 1) {
                combo = 1;
                comboText.classList.remove("active");
            } else {
                comboText.textContent = `COMBO x${combo.toFixed(2)}`;
            }
        }
    }

    function createIdleGlow() {
        if (Math.random() < 0.035) {
            activateTrail(
                fireX + randomNumber(-3, 3),
                fireY + randomNumber(-3, 3)
            );
        }
    }

    function resetCircularMotion() {
        circleCenterX = window.innerWidth / 2;
        circleCenterY = window.innerHeight / 2;
        previousAngle = null;
        accumulatedAngle = 0;
        rotationDirection = 0;
        updateRotationUI();
    }

    function prepareGame() {
        score = 0;
        timeLeft = 30;
        combo = 1;
        comboTimer = 0;

        isPlaying = false;
        isCountingDown = true;

        scoreText.textContent = score;
        timerText.textContent = timeLeft;
        comboText.classList.remove("active");

        resetCircularMotion();

        startPanel.classList.add("hidden");
        endPanel.classList.add("hidden");

        clearInterval(gameTimer);
        clearInterval(countdownTimer);

        startCountdown();
    }

    function startCountdown() {
        let count = 3;

        countdownText.textContent = count;
        countdownText.classList.remove("active");

        void countdownText.offsetWidth;
        countdownText.classList.add("active");

        countdownTimer = setInterval(function() {
            count -= 1;

            if (count > 0) {
                countdownText.textContent = count;
                countdownText.classList.remove("active");

                void countdownText.offsetWidth;
                countdownText.classList.add("active");
            } else {
                clearInterval(countdownTimer);

                countdownText.textContent = "START!";
                countdownText.classList.remove("active");

                void countdownText.offsetWidth;
                countdownText.classList.add("active");

                setTimeout(function() {
                    countdownText.classList.remove("active");
                    countdownText.style.opacity = 0;
                    startGame();
                }, 700);
            }
        }, 1000);
    }

    function startGame() {
        isCountingDown = false;
        isPlaying = true;

        resetCircularMotion();

        clearInterval(gameTimer);

        gameTimer = setInterval(function() {
            timeLeft -= 1;
            timerText.textContent = timeLeft;

            if (timeLeft <= 0) {
                endGame();
            }
        }, 1000);
    }

    function endGame() {
        isPlaying = false;
        isCountingDown = false;

        clearInterval(gameTimer);
        clearInterval(countdownTimer);

        countdownText.classList.remove("active");
        countdownText.style.opacity = 0;

        resultText.textContent = `최종 점수: ${score}점`;
        endPanel.classList.remove("hidden");
        comboText.classList.remove("active");
    }

    function animate() {
        requestAnimationFrame(animate);

        moveFireCore();
        animateTrails();
        updateCombo();
        createIdleGlow();
    }

    window.addEventListener("resize", function() {
        resetCircularMotion();
    });

    startButton.addEventListener("click", prepareGame);
    restartButton.addEventListener("click", prepareGame);

    createTrailPool();
    animate();
</script>

</body>
</html>
